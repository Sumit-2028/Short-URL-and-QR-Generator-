spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/bitly_db?useSSL=false&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=${SPRING_JPA_FORMAT_SQL:true}
jwt.secret=${JWT_SECRET:change-me-to-a-long-random-secret-with-at-least-32-bytes}
jwt.expiration=${JWT_EXPIRATION:86400000}
app.base-url=${APP_BASE_URL:http://localhost:${server.port}}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173}
