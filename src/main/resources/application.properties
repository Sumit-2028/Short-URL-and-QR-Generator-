spring.application.name=tinyurl
# ── Server ──────────────────────────────────────────
server.port=8080

# ── MySQL Database ───────────────────────────────────
# Change 'bitly_db' to whatever you name your MySQL database
spring.datasource.url=jdbc:mysql://localhost:3306/bitly_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=@Sumit2028
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ──────────────────────────────────
# update = auto-creates/updates tables based on your @Entity classes
# Never use 'create' in production — it drops and recreates tables!
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── JWT ──────────────────────────────────────────────
# This secret key signs your tokens — keep it long and private
jwt.secret=WpiVvtCFfCS4NjTfXyax0HD7ujH1S5sYJIWcaFRybVj
jwt.expiration=86400000
# 86400000 ms = 24 hours

# ── App base URL (used to build short URLs) ──────────
app.base-url=http://localhost:8080